<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Drink Machine</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<header>
  <h1>Drink Machine</h1>
  <div class="subtitle">Tap a pump to assign an ingredient</div>
</header>

<div class="pump-grid" id="pump-grid"></div>

<div class="menu">
  <div class="menu-title">Drink Menu</div>
  <input type="text" class="search-box" id="search"
         placeholder="Search drinks or ingredients..."
         oninput="renderDrinks()" autocomplete="off">
  <div class="menu-toggle">
    <button class="toggle-btn active" id="toggle-all" onclick="setMode('all')">All Drinks</button>
    <button class="toggle-btn" id="toggle-make" onclick="setMode('make')">Can Make</button>
  </div>
  <div class="drink-list" id="drink-list"></div>
</div>

<div class="nav">
  <a class="nav-link" href="/test">Hardware Test &rsaquo;</a>
</div>

<div class="modal-backdrop" id="modal" onclick="onModalClick(event)">
  <div class="modal-card">
    <button class="modal-close" onclick="closeDrink()" aria-label="Close">&times;</button>
    <div class="modal-art" id="modal-art"></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
  const running = new Set();
  const editing = new Set();
  const ingredients = {};
  let vocab = [];
  let menuMode = 'all';
  let lastAssignSig = '';
  let allDrinks = [];

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => (
      { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
    ));
  }

  function buildGrid() {
    const grid = document.getElementById('pump-grid');
    for (let i = 1; i <= 8; i++) {
      const card = document.createElement('div');
      card.className = 'pump-card';
      card.id = `pump-${i}`;
      card.innerHTML = `
        <div class="pump-number">Pump ${i}</div>
        <div class="pump-label empty" id="label-${i}" onclick="editLabel(${i})">Tap to assign</div>
      `;
      grid.appendChild(card);
    }
  }

  function renderLabel(id) {
    if (editing.has(id)) return;
    const label = document.getElementById(`label-${id}`);
    if (!label) return;
    const name = ingredients[id] || '';
    label.textContent = name || 'Tap to assign';
    label.classList.toggle('empty', !name);
  }

  function editLabel(id) {
    if (editing.has(id)) return;
    editing.add(id);
    const card = document.getElementById(`pump-${id}`);
    const label = document.getElementById(`label-${id}`);
    const current = ingredients[id] || '';

    const input = document.createElement('input');
    input.className = 'pump-label-input';
    input.type = 'text';
    input.value = current;
    input.placeholder = 'Search ingredient...';
    input.maxLength = 24;
    input.autocomplete = 'off';

    const dropdown = document.createElement('div');
    dropdown.className = 'combo-dropdown';

    let committed = false;
    const restoreLabel = () => {
      const fresh = document.createElement('div');
      fresh.className = 'pump-label';
      fresh.id = `label-${id}`;
      fresh.setAttribute('onclick', `editLabel(${id})`);
      input.replaceWith(fresh);
      dropdown.remove();
      renderLabel(id);
    };
    const commit = async (value) => {
      if (committed || !editing.has(id)) return;
      committed = true;
      editing.delete(id);
      const v = value.trim();
      ingredients[id] = v;
      restoreLabel();
      renderDrinks();
      await assignPump(id, v);
    };
    const cancel = () => {
      if (committed || !editing.has(id)) return;
      committed = true;
      editing.delete(id);
      restoreLabel();
    };

    let activeIndex = -1;
    let options = [];

    const renderOptions = () => {
      const q = input.value.trim().toLowerCase();
      let matches = vocab.filter(name => name.toLowerCase().includes(q));
      const exact = vocab.some(name => name.toLowerCase() === q);
      options = matches.slice();
      let html = matches
        .map((name, i) => `<div class="combo-option" data-i="${i}">${escapeHtml(name)}</div>`)
        .join('');
      // Allow committing a custom value not in the vocabulary
      if (q && !exact) {
        options.push(input.value.trim());
        html += `<div class="combo-option custom" data-i="${matches.length}">Use "${escapeHtml(input.value.trim())}"</div>`;
      }
      dropdown.innerHTML = html || '<div class="combo-option custom">No matches</div>';
      activeIndex = -1;
      dropdown.querySelectorAll('.combo-option[data-i]').forEach(el => {
        el.addEventListener('mousedown', (e) => {
          e.preventDefault();
          commit(options[parseInt(el.dataset.i)]);
        });
      });
    };

    const setActive = (idx) => {
      const els = dropdown.querySelectorAll('.combo-option[data-i]');
      if (!els.length) return;
      activeIndex = (idx + els.length) % els.length;
      els.forEach((el, i) => el.classList.toggle('active', i === activeIndex));
    };

    input.addEventListener('input', renderOptions);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowDown') { e.preventDefault(); setActive(activeIndex + 1); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); setActive(activeIndex - 1); }
      else if (e.key === 'Enter') {
        e.preventDefault();
        commit(activeIndex >= 0 ? options[activeIndex] : input.value);
      } else if (e.key === 'Escape') { cancel(); }
    });
    input.addEventListener('blur', () => setTimeout(() => commit(input.value), 120));

    label.replaceWith(input);
    card.appendChild(dropdown);
    renderOptions();
    input.focus();
    input.select();
  }

  async function assignPump(id, ingredient) {
    try {
      await fetch(`/api/pump/${id}/assign`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ingredient }),
      });
    } catch {}
  }

  function setRunning(id, state) {
    const card = document.getElementById(`pump-${id}`);
    if (!card) return;
    state ? running.add(id) : running.delete(id);
    card.classList.toggle('running', state);
  }

  async function pollStatus() {
    try {
      const data = await fetch('/api/status').then(r => r.json());
      for (const [id, info] of Object.entries(data.pumps)) {
        const pumpId = parseInt(id);
        setRunning(pumpId, info.running);
        if (!editing.has(pumpId)) {
          ingredients[pumpId] = info.ingredient || '';
          renderLabel(pumpId);
        }
      }
      const sig = Object.keys(ingredients).sort()
        .map(k => `${k}:${ingredients[k]}`).join('|');
      if (sig !== lastAssignSig) {
        lastAssignSig = sig;
        renderDrinks();
      }
    } catch {}
  }

  async function loadDrinks() {
    try {
      const data = await fetch('/api/drinks').then(r => r.json());
      allDrinks = data.drinks;
      renderDrinks();
    } catch {}
  }

  async function loadVocab() {
    try {
      const data = await fetch('/api/ingredients').then(r => r.json());
      vocab = data.ingredients || [];
    } catch {}
  }

  function drinkMatches(drink, q) {
    if (!q) return true;
    if (drink.name.toLowerCase().includes(q)) return true;
    if (drink.category.toLowerCase().includes(q)) return true;
    return drink.ingredients.some(i => i.name.toLowerCase().includes(q));
  }

  function availableSet() {
    return new Set(
      Object.values(ingredients)
        .filter(v => v && v.trim())
        .map(v => v.trim().toLowerCase())
    );
  }

  function setMode(mode) {
    menuMode = mode;
    document.getElementById('toggle-all').classList.toggle('active', mode === 'all');
    document.getElementById('toggle-make').classList.toggle('active', mode === 'make');
    renderDrinks();
  }

  function renderDrinks() {
    const q = document.getElementById('search').value.trim().toLowerCase();
    const list = document.getElementById('drink-list');
    const avail = availableSet();

    let drinks = allDrinks.map(d => {
      const missing = d.ingredients
        .filter(i => !avail.has(i.name.trim().toLowerCase()))
        .map(i => i.name);
      return { ...d, available: missing.length === 0, missing };
    });

    drinks = drinks.filter(d => drinkMatches(d, q));
    if (menuMode === 'make') drinks = drinks.filter(d => d.available);

    if (drinks.length === 0) {
      const msg = menuMode === 'make'
        ? 'No drinks available yet — assign ingredients to your pumps.'
        : 'No drinks match your search.';
      list.innerHTML = `<div class="menu-empty">${msg}</div>`;
      return;
    }

    list.innerHTML = drinks.map(d => {
      const ings = d.ingredients.map(i => `${escapeHtml(i.name)} (${i.ml}ml)`).join(' · ');
      const garnish = d.garnish ? `<div class="drink-garnish">${escapeHtml(d.garnish)}</div>` : '';
      const missing = (!d.available && d.missing.length)
        ? `<div class="drink-missing">Missing: ${d.missing.map(escapeHtml).join(', ')}</div>`
        : '';
      const stateClass = avail.size ? (d.available ? ' available' : ' unavailable') : '';
      return `
        <div class="drink-card${stateClass}" onclick="openDrink('${d.id}')">
          <div class="drink-head">
            <span class="drink-name">${escapeHtml(d.name)}<span class="drink-chevron">&rsaquo;</span></span>
            <span class="drink-category">${escapeHtml(d.category)}</span>
          </div>
          <div class="drink-ingredients">${ings}</div>
          ${missing}
          ${garnish}
        </div>`;
    }).join('');
  }

  function lighten(hex, amt) {
    const n = parseInt(hex.slice(1), 16);
    let r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
    r = Math.round(r + (255 - r) * amt);
    g = Math.round(g + (255 - g) * amt);
    b = Math.round(b + (255 - b) * amt);
    return `rgb(${r},${g},${b})`;
  }

  function widthAt(y, top, bot, topW, botW) {
    const t = (y - top) / (bot - top);
    return topW + (botW - topW) * t;
  }

  function glassSVG(glass, color) {
    const light = lighten(color, 0.35);
    const stroke = '#e8e8e8';
    const defs = `<defs>
      <radialGradient id="liq" cx="50%" cy="30%" r="80%">
        <stop offset="0%" stop-color="${light}"/>
        <stop offset="100%" stop-color="${color}"/>
      </radialGradient>
    </defs>`;
    const c = 100;
    let inner = '';

    if (glass === 'highball' || glass === 'rocks') {
      const geo = glass === 'highball'
        ? { topW: 64, botW: 58, top: 22, bot: 232, fill: 0.8 }
        : { topW: 96, botW: 82, top: 96, bot: 224, fill: 0.6 };
      const tH = geo.topW / 2, bH = geo.botW / 2;
      const yf = geo.bot - (geo.bot - geo.top) * geo.fill;
      const wfH = widthAt(yf, geo.top, geo.bot, geo.topW, geo.botW) / 2;
      const glassPts = `${c - tH},${geo.top} ${c + tH},${geo.top} ${c + bH},${geo.bot} ${c - bH},${geo.bot}`;
      const liqPts = `${c - wfH},${yf} ${c + wfH},${yf} ${c + bH},${geo.bot} ${c - bH},${geo.bot}`;
      inner = `
        <polygon points="${liqPts}" fill="url(#liq)"/>
        <ellipse cx="${c}" cy="${yf}" rx="${wfH}" ry="6" fill="${light}" opacity="0.9"/>
        <polygon points="${glassPts}" fill="none" stroke="${stroke}" stroke-width="3" stroke-linejoin="round" opacity="0.8"/>
        <ellipse cx="${c}" cy="${geo.top}" rx="${tH}" ry="7" fill="none" stroke="${stroke}" stroke-width="3" opacity="0.8"/>
        <line x1="${c - tH + 8}" y1="${geo.top + 16}" x2="${c - bH + 6}" y2="${geo.bot - 16}" stroke="#fff" stroke-width="4" opacity="0.1" stroke-linecap="round"/>`;
    } else {
      const rimY = 40, footY = 244;
      const apexY = glass === 'margarita' ? 112 : 122;
      const half = glass === 'margarita' ? 78 : 62;
      let bowlPath, liqPts, surfaceY, surfaceHalf;

      if (glass === 'margarita') {
        const nb = 14;
        bowlPath = `M ${c - half},${rimY} Q ${c - half + 6},${rimY + 28} ${c - nb},${apexY} L ${c + nb},${apexY} Q ${c + half - 6},${rimY + 28} ${c + half},${rimY}`;
        const fill = 0.78;
        surfaceY = rimY + (apexY - rimY) * (1 - fill);
        surfaceHalf = widthAt(surfaceY, rimY, apexY, half, nb);
        liqPts = `${c - surfaceHalf},${surfaceY} ${c + surfaceHalf},${surfaceY} ${c + nb},${apexY} ${c - nb},${apexY}`;
      } else {
        bowlPath = `M ${c - half},${rimY} L ${c},${apexY} L ${c + half},${rimY}`;
        const fill = 0.7;
        surfaceY = apexY - (apexY - rimY) * fill;
        surfaceHalf = half * fill;
        liqPts = `${c - surfaceHalf},${surfaceY} ${c + surfaceHalf},${surfaceY} ${c},${apexY}`;
      }

      inner = `
        <polygon points="${liqPts}" fill="url(#liq)"/>
        <ellipse cx="${c}" cy="${surfaceY}" rx="${surfaceHalf}" ry="6" fill="${light}" opacity="0.9"/>
        <path d="${bowlPath}" fill="none" stroke="${stroke}" stroke-width="3" stroke-linejoin="round" opacity="0.8"/>
        <ellipse cx="${c}" cy="${rimY}" rx="${half}" ry="8" fill="none" stroke="${stroke}" stroke-width="3" opacity="0.8"/>
        <line x1="${c}" y1="${apexY}" x2="${c}" y2="${footY - 8}" stroke="${stroke}" stroke-width="3" opacity="0.8"/>
        <ellipse cx="${c}" cy="${footY}" rx="38" ry="7" fill="none" stroke="${stroke}" stroke-width="3" opacity="0.8"/>`;
    }

    return `<svg viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg">${defs}${inner}</svg>`;
  }

  function openDrink(id) {
    const d = allDrinks.find(x => x.id === id);
    if (!d) return;
    const avail = availableSet();
    const missing = d.ingredients
      .filter(i => !avail.has(i.name.trim().toLowerCase()))
      .map(i => i.name);
    const makeable = missing.length === 0;

    document.getElementById('modal-art').innerHTML = glassSVG(d.glass, d.color);

    const ingHtml = d.ingredients.map(i => {
      const miss = avail.size && !avail.has(i.name.trim().toLowerCase());
      return `<div class="modal-ingredient${miss ? ' missing' : ''}">
        <span class="name">${escapeHtml(i.name)}</span><span class="ml">${i.ml} ml</span>
      </div>`;
    }).join('');

    let availHtml = '';
    if (avail.size) {
      availHtml = makeable
        ? '<div class="modal-availability yes">&#10003; You can make this now</div>'
        : `<div class="modal-availability no">Missing ${missing.length} ingredient${missing.length > 1 ? 's' : ''}</div>`;
    }

    const garnish = d.garnish
      ? `<div class="modal-garnish"><span>Garnish &middot; </span>${escapeHtml(d.garnish)}</div>`
      : '';

    document.getElementById('modal-body').innerHTML = `
      <div class="modal-cat">${escapeHtml(d.category)}</div>
      <h2 class="modal-name">${escapeHtml(d.name)}</h2>
      ${availHtml}
      <div class="modal-section-title">Recipe</div>
      ${ingHtml}
      ${garnish}
      <div class="modal-section-title">History</div>
      <div class="modal-history">${escapeHtml(d.history || '')}</div>`;

    document.getElementById('modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeDrink() {
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow = '';
  }

  function onModalClick(e) {
    if (e.target.id === 'modal') closeDrink();
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeDrink();
  });

  buildGrid();
  loadVocab();
  loadDrinks();
  pollStatus();
  setInterval(pollStatus, 2000);
</script>
</body>
</html>
