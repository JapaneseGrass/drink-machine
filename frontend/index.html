<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Drink Machine</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 20px 16px 40px;
    }

    header {
      text-align: center;
      padding: 28px 0 32px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 300;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #f0c060;
    }

    .subtitle {
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: #444;
      text-transform: uppercase;
      margin-top: 8px;
    }

    .pump-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      max-width: 480px;
      margin: 0 auto;
    }

    .pump-card {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 16px;
      padding: 16px 12px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .pump-card.running {
      border-color: #f0c060;
      box-shadow: 0 0 24px rgba(240, 192, 96, 0.12);
    }

    .pump-number {
      font-size: 0.6rem;
      letter-spacing: 2px;
      color: #333;
      text-transform: uppercase;
    }

    .pump-label {
      font-size: 0.85rem;
      font-weight: 500;
      color: #666;
      text-align: center;
      min-height: 1.2em;
      transition: color 0.3s;
    }

    .pump-card.running .pump-label {
      color: #f0c060;
    }

    .run-btn {
      width: 100%;
      padding: 9px 0;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      background: transparent;
      color: #555;
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .run-btn:hover { border-color: #f0c060; color: #f0c060; }
    .run-btn:active { background: rgba(240, 192, 96, 0.08); }

    .pump-card.running .run-btn {
      border-color: #f0c060;
      color: #f0c060;
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .controls {
      max-width: 480px;
      margin: 16px auto 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .duration-row {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 16px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .duration-label {
      font-size: 0.6rem;
      letter-spacing: 2px;
      color: #444;
      text-transform: uppercase;
      white-space: nowrap;
    }

    input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      height: 2px;
      background: #2a2a2a;
      border-radius: 2px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #f0c060;
      cursor: pointer;
    }

    .duration-value {
      font-size: 0.85rem;
      color: #f0c060;
      min-width: 32px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .stop-btn {
      width: 100%;
      padding: 14px;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      background: transparent;
      color: #444;
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .stop-btn:hover { border-color: #c04040; color: #c04040; }
    .stop-btn:active { background: rgba(192, 64, 64, 0.08); }
  </style>
</head>
<body>

<header>
  <h1>Drink Machine</h1>
  <div class="subtitle">Pump Control</div>
</header>

<div class="pump-grid" id="pump-grid"></div>

<div class="controls">
  <div class="duration-row">
    <span class="duration-label">Duration</span>
    <input type="range" id="duration" min="1" max="15" value="3" step="0.5"
           oninput="durDisplay.textContent = this.value + 's'">
    <span class="duration-value" id="durDisplay">3s</span>
  </div>
  <button class="stop-btn" onclick="stopAll()">Stop All</button>
</div>

<script>
  const running = new Set();

  function buildGrid() {
    const grid = document.getElementById('pump-grid');
    for (let i = 1; i <= 8; i++) {
      const card = document.createElement('div');
      card.className = 'pump-card';
      card.id = `pump-${i}`;
      card.innerHTML = `
        <div class="pump-number">Pump ${i}</div>
        <div class="pump-label" id="label-${i}">—</div>
        <button class="run-btn" onclick="runPump(${i})">Run</button>
      `;
      grid.appendChild(card);
    }
  }

  async function runPump(id) {
    const seconds = parseFloat(document.getElementById('duration').value);
    const res = await fetch(`/api/pump/${id}/run`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ seconds }),
    });
    if (res.ok) {
      setRunning(id, true);
      setTimeout(() => setRunning(id, false), seconds * 1000);
    }
  }

  async function stopAll() {
    await fetch('/api/stop', { method: 'POST' });
    [...running].forEach(id => setRunning(id, false));
  }

  function setRunning(id, state) {
    const card = document.getElementById(`pump-${id}`);
    if (!card) return;
    state ? running.add(id) : running.delete(id);
    card.classList.toggle('running', state);
  }

  async function pollStatus() {
    try {
      const data = await fetch('/api/status').then(r => r.json());
      for (const [id, info] of Object.entries(data.pumps)) {
        setRunning(parseInt(id), info.running);
      }
    } catch {}
  }

  buildGrid();
  setInterval(pollStatus, 2000);
</script>
</body>
</html>
