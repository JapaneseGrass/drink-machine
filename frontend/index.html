<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Drink Machine</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 20px 16px 40px;
    }

    header {
      text-align: center;
      padding: 28px 0 32px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 300;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #f0c060;
    }

    .subtitle {
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: #444;
      text-transform: uppercase;
      margin-top: 8px;
    }

    .pump-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      max-width: 480px;
      margin: 0 auto;
    }

    .pump-card {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 16px;
      padding: 16px 12px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .pump-card.running {
      border-color: #f0c060;
      box-shadow: 0 0 24px rgba(240, 192, 96, 0.12);
    }

    .pump-number {
      font-size: 0.6rem;
      letter-spacing: 2px;
      color: #333;
      text-transform: uppercase;
    }

    .pump-label {
      font-size: 0.85rem;
      font-weight: 500;
      color: #666;
      text-align: center;
      min-height: 1.2em;
      transition: color 0.3s;
      cursor: pointer;
      border-bottom: 1px dashed transparent;
      padding: 2px 4px;
      -webkit-tap-highlight-color: transparent;
    }

    .pump-label:hover { border-bottom-color: #333; }

    .pump-label.empty {
      color: #3a3a3a;
      font-style: italic;
      font-weight: 400;
    }

    .pump-card.running .pump-label {
      color: #f0c060;
    }

    .pump-label-input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #f0c060;
      border-radius: 8px;
      color: #f0f0f0;
      font-size: 0.85rem;
      font-family: inherit;
      text-align: center;
      padding: 3px 4px;
      outline: none;
    }

    .run-btn {
      width: 100%;
      padding: 9px 0;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      background: transparent;
      color: #555;
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .run-btn:hover { border-color: #f0c060; color: #f0c060; }
    .run-btn:active { background: rgba(240, 192, 96, 0.08); }

    .pump-card.running .run-btn {
      border-color: #f0c060;
      color: #f0c060;
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .controls {
      max-width: 480px;
      margin: 16px auto 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .duration-row {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 16px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .duration-label {
      font-size: 0.6rem;
      letter-spacing: 2px;
      color: #444;
      text-transform: uppercase;
      white-space: nowrap;
    }

    input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      height: 2px;
      background: #2a2a2a;
      border-radius: 2px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #f0c060;
      cursor: pointer;
    }

    .duration-value {
      font-size: 0.85rem;
      color: #f0c060;
      min-width: 32px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .stop-btn {
      width: 100%;
      padding: 14px;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      background: transparent;
      color: #444;
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .stop-btn:hover { border-color: #c04040; color: #c04040; }
    .stop-btn:active { background: rgba(192, 64, 64, 0.08); }

    .menu {
      max-width: 480px;
      margin: 40px auto 0;
    }

    .menu-title {
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: #444;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 16px;
    }

    .search-box {
      width: 100%;
      padding: 13px 16px;
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 14px;
      color: #f0f0f0;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      margin-bottom: 14px;
      transition: border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .search-box::placeholder { color: #444; }
    .search-box:focus { border-color: #f0c060; }

    .drink-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .drink-card {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 14px;
      padding: 14px 16px;
    }

    .drink-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
    }

    .drink-name {
      font-size: 1rem;
      font-weight: 500;
      color: #f0f0f0;
    }

    .drink-category {
      font-size: 0.55rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #f0c060;
      white-space: nowrap;
    }

    .drink-ingredients {
      font-size: 0.78rem;
      color: #666;
      margin-top: 6px;
      line-height: 1.5;
    }

    .drink-garnish {
      font-size: 0.68rem;
      color: #3f3f3f;
      font-style: italic;
      margin-top: 4px;
    }

    .menu-empty {
      text-align: center;
      color: #3a3a3a;
      font-size: 0.85rem;
      padding: 24px 0;
    }
  </style>
</head>
<body>

<header>
  <h1>Drink Machine</h1>
  <div class="subtitle">Tap a label to assign an ingredient</div>
</header>

<div class="pump-grid" id="pump-grid"></div>

<div class="controls">
  <div class="duration-row">
    <span class="duration-label">Duration</span>
    <input type="range" id="duration" min="1" max="15" value="3" step="0.5"
           oninput="durDisplay.textContent = this.value + 's'">
    <span class="duration-value" id="durDisplay">3s</span>
  </div>
  <button class="stop-btn" onclick="stopAll()">Stop All</button>
</div>

<div class="menu">
  <div class="menu-title">Drink Menu</div>
  <input type="text" class="search-box" id="search"
         placeholder="Search drinks or ingredients..."
         oninput="renderDrinks()" autocomplete="off">
  <div class="drink-list" id="drink-list"></div>
</div>

<script>
  const running = new Set();
  const editing = new Set();
  const ingredients = {};

  function buildGrid() {
    const grid = document.getElementById('pump-grid');
    for (let i = 1; i <= 8; i++) {
      const card = document.createElement('div');
      card.className = 'pump-card';
      card.id = `pump-${i}`;
      card.innerHTML = `
        <div class="pump-number">Pump ${i}</div>
        <div class="pump-label empty" id="label-${i}" onclick="editLabel(${i})">Tap to assign</div>
        <button class="run-btn" onclick="runPump(${i})">Run</button>
      `;
      grid.appendChild(card);
    }
  }

  function renderLabel(id) {
    if (editing.has(id)) return;
    const label = document.getElementById(`label-${id}`);
    if (!label) return;
    const name = ingredients[id] || '';
    label.textContent = name || 'Tap to assign';
    label.classList.toggle('empty', !name);
  }

  function editLabel(id) {
    if (editing.has(id)) return;
    editing.add(id);
    const label = document.getElementById(`label-${id}`);
    const current = ingredients[id] || '';
    const input = document.createElement('input');
    input.className = 'pump-label-input';
    input.type = 'text';
    input.value = current;
    input.placeholder = 'e.g. Vodka';
    input.maxLength = 24;

    const finish = async (save) => {
      if (!editing.has(id)) return;
      editing.delete(id);
      if (save) {
        const value = input.value.trim();
        ingredients[id] = value;
        await assignPump(id, value);
      }
      const fresh = document.createElement('div');
      fresh.className = 'pump-label';
      fresh.id = `label-${id}`;
      fresh.setAttribute('onclick', `editLabel(${id})`);
      input.replaceWith(fresh);
      renderLabel(id);
    };

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') input.blur();
      else if (e.key === 'Escape') finish(false);
    });
    input.addEventListener('blur', () => finish(true));

    label.replaceWith(input);
    input.focus();
    input.select();
  }

  async function assignPump(id, ingredient) {
    try {
      await fetch(`/api/pump/${id}/assign`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ingredient }),
      });
    } catch {}
  }

  async function runPump(id) {
    const seconds = parseFloat(document.getElementById('duration').value);
    const res = await fetch(`/api/pump/${id}/run`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ seconds }),
    });
    if (res.ok) {
      setRunning(id, true);
      setTimeout(() => setRunning(id, false), seconds * 1000);
    }
  }

  async function stopAll() {
    await fetch('/api/stop', { method: 'POST' });
    [...running].forEach(id => setRunning(id, false));
  }

  function setRunning(id, state) {
    const card = document.getElementById(`pump-${id}`);
    if (!card) return;
    state ? running.add(id) : running.delete(id);
    card.classList.toggle('running', state);
  }

  async function pollStatus() {
    try {
      const data = await fetch('/api/status').then(r => r.json());
      for (const [id, info] of Object.entries(data.pumps)) {
        const pumpId = parseInt(id);
        setRunning(pumpId, info.running);
        ingredients[pumpId] = info.ingredient || '';
        renderLabel(pumpId);
      }
    } catch {}
  }

  let allDrinks = [];

  async function loadDrinks() {
    try {
      const data = await fetch('/api/drinks').then(r => r.json());
      allDrinks = data.drinks;
      renderDrinks();
    } catch {}
  }

  function drinkMatches(drink, q) {
    if (!q) return true;
    if (drink.name.toLowerCase().includes(q)) return true;
    if (drink.category.toLowerCase().includes(q)) return true;
    return drink.ingredients.some(i => i.name.toLowerCase().includes(q));
  }

  function renderDrinks() {
    const q = document.getElementById('search').value.trim().toLowerCase();
    const list = document.getElementById('drink-list');
    const matches = allDrinks.filter(d => drinkMatches(d, q));

    if (matches.length === 0) {
      list.innerHTML = '<div class="menu-empty">No drinks match your search.</div>';
      return;
    }

    list.innerHTML = matches.map(d => {
      const ings = d.ingredients.map(i => `${i.name} (${i.ml}ml)`).join(' · ');
      const garnish = d.garnish ? `<div class="drink-garnish">${d.garnish}</div>` : '';
      return `
        <div class="drink-card">
          <div class="drink-head">
            <span class="drink-name">${d.name}</span>
            <span class="drink-category">${d.category}</span>
          </div>
          <div class="drink-ingredients">${ings}</div>
          ${garnish}
        </div>`;
    }).join('');
  }

  buildGrid();
  pollStatus();
  loadDrinks();
  setInterval(pollStatus, 2000);
</script>
</body>
</html>
